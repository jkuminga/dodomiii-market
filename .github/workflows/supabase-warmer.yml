name: Supabase Warmer

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  warm:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Call warmup endpoint
        run: |
          curl --fail --silent --show-error --max-time 30 "$WARMUP_URL"
        env:
          WARMUP_URL: ${{ secrets.WARMUP_URL }}
